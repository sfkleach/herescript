name: Build and Test

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    # Run weekly on Monday at 06:00 UTC to catch workflow bit-rot early.
    - cron: '0 6 * * 1'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build
        run: make all

      - name: Run functional tests
        run: just functest
