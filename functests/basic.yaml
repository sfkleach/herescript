      #!${BUILD_DIR}/herescript ${BUILD_DIR}/test-herescript
      #>
    exit_code: 4
    stderr: "herescript: malformed #> line (expected '#> ' prefix)\n"
  - name: inline-default-dash-unset
    description: "${NAME-VALUE} with unset NAME uses the default"
    script: |
      #!${BUILD_DIR}/herescript ${BUILD_DIR}/test-herescript
      #: --val=${UNSET_VAR_XYZ-fallback}
    output: |
