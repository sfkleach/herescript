  - name: inline-default-empty-value
    description: "${NAME-} with unset NAME defaults to empty string"
    script: |
      #!${BUILD_DIR}/herescript ${BUILD_DIR}/test-herescript
      #: --val=${UNSET_VAR_XYZ-}
    output: |
      {
          "env": [
