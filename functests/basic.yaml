          ],
          "argv": [
              "${BUILD_DIR}/test-herescript",
              "--script=${BUILD_DIR}/new-style-args-param-zero.sh",
              "${BUILD_DIR}/new-style-args-param-zero.sh"
          ]
      }

  - name: new-style-args-param-one
    args:
      - hello
      - world
    script: |
      #!${BUILD_DIR}/herescript ${BUILD_DIR}/test-herescript
      #: ${1} ${2} ${0}
    output: |
