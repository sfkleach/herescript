  - name: inline-arg-missing-space
    description: "#> without a following space is a syntax error"
    script: |
      #!${BUILD_DIR}/herescript ${BUILD_DIR}/test-herescript
      #>no-space-here
    exit_code: 4
    stderr: "herescript: malformed #> line (expected '#> ' prefix)\n"

  - name: inline-arg-bare
    description: "Bare #> with no content at all is a syntax error"
