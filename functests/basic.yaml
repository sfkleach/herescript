  - name: new-style-args-whitespace
    script: |
      #!${BUILD_DIR}/herescript ${BUILD_DIR}/test-herescript
      #: --foo --bar baz ${0}
    output: |
      {
          "env": [
              "HERESCRIPT_FILE=${BUILD_DIR}/new-style-args-whitespace.sh"
          ],
          "argv": [
              "${BUILD_DIR}/test-herescript",
              "--foo",
              "--bar",
              "baz",
              "${BUILD_DIR}/new-style-args-whitespace.sh"
          ]
      }

  - name: new-style-args-single-quotes
    script: |
      #!${BUILD_DIR}/herescript ${BUILD_DIR}/test-herescript
      #: 'hello world' foo'bar baz'boink ${0}
    output: |
      {
          "env": [
              "HERESCRIPT_FILE=${BUILD_DIR}/new-style-args-single-quotes.sh"
          ],
          "argv": [
              "${BUILD_DIR}/test-herescript",
              "hello world",
              "foobar bazboink",
              "${BUILD_DIR}/new-style-args-single-quotes.sh"
          ]
      }

  - name: new-style-args-dollar-single-quotes
    script: |
      #!${BUILD_DIR}/herescript ${BUILD_DIR}/test-herescript
      #: $'hello\tworld' $'back\\slash' $'space\sinside' ${0}
    output: |
      {
          "env": [
              "HERESCRIPT_FILE=${BUILD_DIR}/new-style-args-dollar-single-quotes.sh"
          ],
          "argv": [
              "${BUILD_DIR}/test-herescript",
              "hello\tworld",
              "back\\slash",
              "space inside",
              "${BUILD_DIR}/new-style-args-dollar-single-quotes.sh"
          ]
      }

  - name: new-style-args-var-substitution
    env:
      GREETING: hello
      TARGET: world
    script: |
      #!${BUILD_DIR}/herescript ${BUILD_DIR}/test-herescript
      #: --msg=${GREETING} ${TARGET} ${0}
    output: |
      {
          "env": [
              "GREETING=hello",
              "TARGET=world",
              "HERESCRIPT_FILE=${BUILD_DIR}/new-style-args-var-substitution.sh"
          ],
          "argv": [
              "${BUILD_DIR}/test-herescript",
              "--msg=hello",
              "world",
              "${BUILD_DIR}/new-style-args-var-substitution.sh"
          ]
      }

  - name: new-style-args-undefined-variable
    script: |
      #!${BUILD_DIR}/herescript ${BUILD_DIR}/test-herescript
      #: ${DOES_NOT_EXIST}
    exit_code: 2

  - name: new-style-args-param-zero
    script: |
      #!${BUILD_DIR}/herescript ${BUILD_DIR}/test-herescript
      #: --script=${0} ${0}
    output: |
      {
          "env": [
              "HERESCRIPT_FILE=${BUILD_DIR}/new-style-args-param-zero.sh"
          ],
          "argv": [
              "${BUILD_DIR}/test-herescript",
              "--script=${BUILD_DIR}/new-style-args-param-zero.sh",
              "${BUILD_DIR}/new-style-args-param-zero.sh"
          ]
      }

  - name: new-style-args-param-one
    args:
      - hello
      - world
    script: |
      #!${BUILD_DIR}/herescript ${BUILD_DIR}/test-herescript
      #: ${1} ${2} ${0}
    output: |
      {
          "env": [
              "HERESCRIPT_FILE=${BUILD_DIR}/new-style-args-param-one.sh"
          ],
          "argv": [
              "${BUILD_DIR}/test-herescript",
              "hello",
              "world",
              "${BUILD_DIR}/new-style-args-param-one.sh"
          ]
      }

  - name: new-style-args-param-out-of-range
    script: |
      #!${BUILD_DIR}/herescript ${BUILD_DIR}/test-herescript
      #: ${5} ${0}
    output: |
      {
          "env": [
              "HERESCRIPT_FILE=${BUILD_DIR}/new-style-args-param-out-of-range.sh"
          ],
          "argv": [
              "${BUILD_DIR}/test-herescript",
              "",
              "${BUILD_DIR}/new-style-args-param-out-of-range.sh"
          ]
      }

  - name: new-style-args-herescript-file
    script: |
      #!${BUILD_DIR}/herescript ${BUILD_DIR}/test-herescript
      #: --file=${HERESCRIPT_FILE} ${0}
    output: |
      {
          "env": [
              "HERESCRIPT_FILE=${BUILD_DIR}/new-style-args-herescript-file.sh"
          ],
          "argv": [
              "${BUILD_DIR}/test-herescript",
              "--file=${BUILD_DIR}/new-style-args-herescript-file.sh",
              "${BUILD_DIR}/new-style-args-herescript-file.sh"
          ]
      }

  - name: new-style-args-slice-all-params
    args:
      - alpha
      - beta
      - gamma
    script: |
      #!${BUILD_DIR}/herescript ${BUILD_DIR}/test-herescript
      #: ${1:}
    output: |
      {
          "env": [
              "HERESCRIPT_FILE=${BUILD_DIR}/new-style-args-slice-all-params.sh"
          ],
          "argv": [
              "${BUILD_DIR}/test-herescript",
              "alpha",
              "beta",
              "gamma"
          ]
      }

  - name: new-style-args-slice-from-zero
    args:
      - alpha
      - beta
    script: |
      #!${BUILD_DIR}/herescript ${BUILD_DIR}/test-herescript
      #: ${0:}
    output: |
      {
          "env": [
              "HERESCRIPT_FILE=${BUILD_DIR}/new-style-args-slice-from-zero.sh"
          ],
          "argv": [
              "${BUILD_DIR}/test-herescript",
              "${BUILD_DIR}/new-style-args-slice-from-zero.sh",
              "alpha",
              "beta"
          ]
      }

  - name: new-style-args-slice-range
    args:
      - alpha
      - beta
      - gamma
      - delta
    script: |
      #!${BUILD_DIR}/herescript ${BUILD_DIR}/test-herescript
      #: ${1:3}
    output: |
      {
          "env": [
              "HERESCRIPT_FILE=${BUILD_DIR}/new-style-args-slice-range.sh"
          ],
          "argv": [
              "${BUILD_DIR}/test-herescript",
              "alpha",
              "beta"
          ]
      }

  - name: new-style-args-slice-dollar-at
    args:
      - hello
      - world
    script: |
      #!${BUILD_DIR}/herescript ${BUILD_DIR}/test-herescript
      #: $@
    output: |
      {
          "env": [
              "HERESCRIPT_FILE=${BUILD_DIR}/new-style-args-slice-dollar-at.sh"
          ],
          "argv": [
              "${BUILD_DIR}/test-herescript",
              "hello",
              "world"
          ]
      }

  - name: new-style-args-slice-empty
    script: |
      #!${BUILD_DIR}/herescript ${BUILD_DIR}/test-herescript
      #: ${1:}
    output: |
      {
          "env": [
              "HERESCRIPT_FILE=${BUILD_DIR}/new-style-args-slice-empty.sh"
          ],
          "argv": [
              "${BUILD_DIR}/test-herescript"
          ]
      }

  - name: new-style-args-colon-expansion
    args:
      - foo
      - bar
    script: |
      #!${BUILD_DIR}/herescript ${BUILD_DIR}/test-herescript
      #: ${:}
    output: |
      {
          "env": [
              "HERESCRIPT_FILE=${BUILD_DIR}/new-style-args-colon-expansion.sh"
          ],
          "argv": [
              "${BUILD_DIR}/test-herescript",
              "${BUILD_DIR}/new-style-args-colon-expansion.sh",
              "foo",
              "bar"
          ]
      }
